<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 페이지</title>

    <link rel="stylesheet" href="css/signup.css" />
  </head>
  <body>
    <div class="container">
      <h2 class="naver-title">NAVER</h2>

      <p class="title">본인확인을 위한<br />휴대전화 인증이 필요합니다</p>

      <!-- 약관 동의 -->
      <div class="terms-box" id="termsBox">
        <div class="terms-header" onclick="toggleTerms()">
          <span class="terms-check" id="termsCheck">
            <img
              src="assets/icons/가입-체크.png"
              alt="체크표시"
              id="termsCheckImg"
            />약관 전체 동의
          </span>
          <img
            src="assets/icons/가입-업.png"
            alt="전체페이지 접기"
            id="termsArrow"
            class="arrow-icon"
          />
        </div>

        <!-- 약관 상세(펼침) -->
        <div class="terms-detail" id="termsDetail">
          <div class="terms-item">
            <span class="terms-list">
              <img
                src="assets/icons/가입-체크s.png"
                alt="체크"
                class="item-check"
              />인증시 개인정보 이용 <span class="required">(필수)</span>
            </span>
            <span class="terms-link"
              >전체<img src="assets/icons/가입-오.png" alt="전체보기"
            /></span>
          </div>

          <div class="terms-item">
            <span class="terms-list">
              <img
                src="assets/icons/가입-체크s.png"
                alt="체크"
                class="item-check"
              />인증시 고유식별정보 처리
              <span class="required">(필수)</span>
            </span>
            <span class="terms-link"
              >전체<img src="assets/icons/가입-오.png" alt="전체보기"
            /></span>
          </div>

          <div class="terms-item">
            <span class="terms-list">
              <img
                src="assets/icons/가입-체크s.png"
                alt="체크"
                class="item-check"
              />통신사 이용약관 <span class="required">(필수)</span>
            </span>
            <span class="terms-link"
              >전체<img src="assets/icons/가입-오.png" alt="전체보기"
            /></span>
          </div>

          <div class="terms-item">
            <span class="terms-list">
              <img
                src="assets/icons/가입-체크s.png"
                alt="체크"
                class="item-check"
              />인증사 이용약관 <span class="required">(필수)</span>
            </span>
            <span class="terms-link"
              >전체<img src="assets/icons/가입-오.png" alt="전체보기"
            /></span>
          </div>

          <div class="terms-item">
            <span class="terms-list">
              <img
                src="assets/icons/가입-체크s.png"
                alt="체크"
                class="item-check"
              />네이버파이낸셜 개인정보 수집
              <span class="optional">(선택)</span>
            </span>
            <span class="terms-link"
              >전체<img src="assets/icons/가입-오.png" alt="전체보기"
            /></span>
          </div>
        </div>
      </div>

      <!-- 입력 폼 -->
      <div class="form-box">
        <div class="input-row">
          <img
            src="assets/icons/로그인-이름.png"
            alt="사람아이콘"
            class="input-icon"
          />
          <input type="text" placeholder="이름" id="nameInput" />
        </div>

        <div class="input-row">
          <img
            src="assets/icons/로그인-날짜.png"
            alt="달력 아이콘"
            class="input-icon"
          />
          <input
            type="text"
            placeholder="생년월일 8자리"
            id="birthInput"
            maxlength="8"
          />
          <div class="toggle-group">
            <button
              class="toggle-btn active"
              id="maleBtn"
              onclick="selectGender('male')"
            >
              남자
            </button>
            <button
              class="toggle-btn"
              id="femaleBtn"
              onclick="selectGender('female')"
            >
              여자
            </button>
          </div>
        </div>

        <div class="input-row">
          <img
            src="assets/icons/로그인-통신사.png"
            alt="통신사 아이콘"
            class="input-icon"
          />
          <select class="carrier-select" id="carrierSelect">
            <option value="">통신사 선택</option>
            <option value="KT">KT</option>
            <option value="SKT">SKT</option>
            <option value="LGU">LG U+</option>
          </select>
          <div class="toggle-group">
            <button
              class="toggle-btn active"
              id="domesticBtn"
              onclick="selectNational('domestic')"
            >
              내국인
            </button>
            <button
              class="toggle-btn"
              id="foriegnBtn"
              onclick="selectNational('foreign')"
            >
              외국인
            </button>
          </div>
        </div>

        <div class="input-row">
          <img
            src="assets/icons/로그인-번호.png"
            alt="휴대폰 아이콘"
            class="input-icon"
          />
          <input
            type="tel"
            placeholder="전화번호"
            id="phoneInput"
            maxlength="11"
          />
          <button class="verify-btn" id="verifyBtn" onclick="sendCode()">
            인증요청
          </button>
        </div>

        <!-- 인증번호 입력(인증요청 후 표시) -->
        <div class="input-row hidden" id="codeRow">
          <img
            src="assets/icons/가입-잠금.png"
            alt="자물쇠 아이콘"
            class="input-icon"
          />
          <input
            type="text"
            placeholder="인증번호"
            id="codeInput"
            maxlength="6"
          />
          <span class="timer" id="timer"
            ><img
              src="assets/icons/가입-시간.png"
              alt="시계 아이콘"
              class="timer-icon"
            />04분 53초</span
          >
          <span class="time-extend" onclick="extendTime()">시간연장</span>
          <p class="code-msg hidden" id="codeMsg">
            인증번호를 발송하였습니다.<br />확인후 번호를 입력해 주세요.
          </p>
        </div>
      </div>

      <!-- 다음 버튼 -->
      <button class="next-btn" id="nextBtn" disabled onclick="goNext()">
        다음
      </button>

      <!-- 안내 문구 -->
      <p class="notice">
        안전한 사용을 위해 <span class="highlight">본인확인</span>을 진행합니다.
      </p>
    </div>
    <script src="js/script.js" defer></script>
  </body>
</html>
