<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>네이버웹툰 로그인 페이지</title>

    <link rel="stylesheet" href="css/login.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="top">
        <img src="assets/icons/logo-m.png" alt="네이버 웹툰 로고" />
        <p class="subtitle">당신의 취향에 맞춘 웹툰</p>
      </div>

      <div class="buttons">
        <button
          class="btn btn-naver"
          onclick="location.href = 'login-naver.html'"
        >
          네이버로 로그인
        </button>
        <button class="btn btn-signup" onclick="location.href = 'signup.html'">
          회원가입
        </button>
        <button
          class="btn btn-guest"
          onclick="location.href = 'onboarding.html'"
        >
          게스트로 계속하기
        </button>
      </div>
    </div>
  </body>
</html>
